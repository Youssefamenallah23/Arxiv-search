services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=arxiv_abstract_chunks
      - RAG_USE_QDRANT=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    depends_on:
      qdrant:
        condition: service_healthy
    command: >
      sh -c "python scripts/index_qdrant.py
      --chunks data/processed/chunks_512_2026-06-19.jsonl
      --url http://qdrant:6333
      && python scripts/run_api.py --host 0.0.0.0 --port 8000 --use-qdrant"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      - api

volumes:
  qdrant_data:
