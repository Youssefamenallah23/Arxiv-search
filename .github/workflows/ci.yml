name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Check formatting with ruff
        run: ruff check src/ tests/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Type check with mypy
        run: mypy src/ tests/ --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Make a minimal corpus for tests
        run: |
          mkdir -p data/raw data/processed
          echo '{"paper_id": "2606.00001v1", "title": "Test", "abstract": "A test paper about machine learning.", "categories": ["cs.AI"], "authors": ["Test Author"], "published": "2026-01-01", "updated": "2026-01-01"}' > data/raw/arxiv_corpus_2026-06-19.jsonl
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
